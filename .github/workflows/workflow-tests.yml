name: Workflow Tests (merobox)

on:
  push:
    branches: [main, master]
    paths:
      - "logic/**"
      - "workflows/**"
  pull_request:
    branches: [main, master]
    paths:
      - "logic/**"
      - "workflows/**"

concurrency:
  group: workflow-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows:
    name: merobox Workflow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            logic/target
          key: cargo-${{ runner.os }}-${{ hashFiles('logic/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build WASM
        run: |
          cd logic
          cargo build --target wasm32-unknown-unknown --profile app-release
          mkdir -p res
          cp target/wasm32-unknown-unknown/app-release/meropixart.wasm res/

      - name: Install merobox
        run: pip install merobox==0.6.24 && merobox --version

      - name: Run E2E workflow
        working-directory: workflows
        run: |
          max_attempts=2
          attempt=1
          success=false
          while [ $attempt -le $max_attempts ]; do
            if [ $attempt -gt 1 ]; then
              merobox stop --all || true
              merobox nuke --force || true
              sleep 2
            fi
            if merobox bootstrap run e2e.yml; then
              success=true
              break
            fi
            attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke --force || true
          [ "$success" = true ] || exit 1

      - name: Run logic-test workflow
        working-directory: workflows
        run: |
          max_attempts=2
          attempt=1
          success=false
          while [ $attempt -le $max_attempts ]; do
            if [ $attempt -gt 1 ]; then
              merobox stop --all || true
              merobox nuke --force || true
              sleep 2
            fi
            if merobox bootstrap run logic-test.yml; then
              success=true
              break
            fi
            attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke --force || true
          [ "$success" = true ] || exit 1
